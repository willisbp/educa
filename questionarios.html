     <section id="quiz">
    

<section id="quiz" class="container">

    <h2>🧠 Quiz de Humanas</h2>

    <div class="quiz-card">
        <p><strong>1. Quem descobriu o Brasil?</strong></p>
        <label><input type="radio" name="q1" value="a"> Dom Pedro I</label>
        <label><input type="radio" name="q1" value="b"> Pedro Álvares Cabral</label>
        <label><input type="radio" name="q1" value="c"> Getúlio Vargas</label>
    </div>

    <div class="quiz-card">
        <p><strong>2. Qual é a capital do Brasil?</strong></p>
        <label><input type="radio" name="q2" value="a"> Rio de Janeiro</label>
        <label><input type="radio" name="q2" value="b"> Brasília</label>
        <label><input type="radio" name="q2" value="c"> São Paulo</label>
    </div>

    <div class="quiz-card">
        <p><strong>3. O que é sujeito em uma frase?</strong></p>
        <label><input type="radio" name="q3" value="a"> Quem realiza a ação</label>
        <label><input type="radio" name="q3" value="b"> O verbo</label>
        <label><input type="radio" name="q3" value="c"> O tempo</label>
    </div>

    <div class="quiz-card">
        <p><strong>4. Em que continente fica o Brasil?</strong></p>
        <label><input type="radio" name="q4" value="a"> Europa</label>
        <label><input type="radio" name="q4" value="b"> América do Sul</label>
        <label><input type="radio" name="q4" value="c"> África</label>
    </div>

    <div class="quiz-card">
        <p><strong>5. Quem foi o primeiro presidente do Brasil?</strong></p>
        <label><input type="radio" name="q5" value="a"> Deodoro da Fonseca</label>
        <label><input type="radio" name="q5" value="b"> Lula</label>
        <label><input type="radio" name="q5" value="c"> Juscelino Kubitschek</label>
    </div>

    <button onclick="corrigirQuiz()">Ver Resultado</button>
    <p id="resultado"></p>

</section>
    </div>
</section>
</main>
<script>
function corrigirQuiz() {
    let pontos = 0;

    const respostas = {
        q1: "b",
        q2: "b",
        q3: "a",
        q4: "b",
        q5: "a"
    };

    for (let i = 1; i <= 5; i++) {
        let questao = document.querySelector(`input[name="q${i}"]:checked`);
        if (questao && questao.value === respostas[`q${i}`]) {
            pontos++;
        }
    }

    const resultado = document.getElementById("resultado");

    resultado.innerText = `Você acertou ${pontos} de 5 questões!`;

    if (pontos === 5) {
        resultado.innerText += " 🏆 Excelente!";
    } else if (pontos >= 3) {
        resultado.innerText += " 👍 Bom trabalho!";
    } else {
        resultado.innerText += " 📚 Precisa estudar mais!";
    }
}
</script>

<script src="script.js"></script>

</nav>
